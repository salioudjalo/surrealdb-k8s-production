apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
  namespace: surrealdb
spec:
  serviceName: surrealdb
  replicas: 1
  selector:
    matchLabels:
      app: surrealdb
  template:
    metadata:
      labels:
        app: surrealdb
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:nightly-dev
          args:
            - start
            - --user
            - $(SURREAL_USER)
            - --pass
            - $(SURREAL_PASS)
            - file:/data/database.db
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: SURREAL_USER
              valueFrom:
                secretKeyRef:
                  name: surrealdb-auth
                  key: SURREAL_USER
            - name: SURREAL_PASS
              valueFrom:
                secretKeyRef:
                  name: surrealdb-auth
                  key: SURREAL_PASS
          volumeMounts:
            - name: surrealdb-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
  volumeClaimTemplates:
    - metadata:
        name: surrealdb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi